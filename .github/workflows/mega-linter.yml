# MegaLinter - code quality across the repo. Report-only (no auto-fix
# commits); see .mega-linter.yml for what's disabled and why.
# https://megalinter.io
---
name: MegaLinter

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request: null

concurrency:
  group: megalinter-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: MegaLinter
        uses: oxsecurity/megalinter/flavors/documentation@v9
        env:
          MEGALINTER_CONFIG: .github/linters/.mega-linter.yml
          VALIDATE_ALL_CODEBASE: >-
            ${{
              github.event_name == 'push' &&
              contains(fromJSON('["refs/heads/main", "refs/heads/master"]'), github.ref)
            }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive MegaLinter reports
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: MegaLinter reports
          include-hidden-files: "true"
          path: |
            megalinter-reports
            mega-linter.log
