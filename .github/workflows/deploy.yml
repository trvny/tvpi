name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-tvpi-worker
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Keep workflow alive
        # Scheduled workflows are auto-disabled after 60 days of repo
        # inactivity; re-enabling on every run prevents that.
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/refresh.yml/enable"

      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - run: npm install
        working-directory: worker

      - name: Type check
        run: npm run typecheck
        working-directory: worker

      - name: Deploy
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
