name: Refresh TVP M3U

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Keep workflow alive
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/refresh.yml/enable"

      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Install yt-dlp
        run: pip install -q yt-dlp

      - name: Generate playlists
        run: python3 generate.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streams/
          git diff --cached --quiet || git commit -m "chore: refresh streams [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
