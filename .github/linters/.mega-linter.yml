# MegaLinter configuration
# Docs: https://megalinter.io/latest/config-file/
---
FLAVOR_SUGGESTIONS: false
# Auto-fix applied in-container and surfaced under
# megalinter-reports/updated_sources/ in the artifact. No writeback:
# mega-linter.yml keeps APPLY_FIXES_EVENT: none, so nothing is committed.
APPLY_FIXES: all

# REPOSITORY: secret/SAST scanning - GitHub secret scanning + Dependabot
#   already cover this here
# SPELL: cspell - not useful for this repo's content
# COPYPASTE: jscpd - not useful for this repo's size
DISABLE:
  - REPOSITORY
  - SPELL
  - COPYPASTE

# ACTION_ZIZMOR: now enabled and green (see below + .github/zizmor.yml).
#   Runs offline; unpinned-uses waived to ref-pin; artipacked fixed via
#   persist-credentials (deploy) or waived inline where the job pushes (refresh).
# SQL_TSQLLINT: MegaLinter's only SQL linter defaults to T-SQL (MSSQL)
#   dialect - worker/migrations is SQLite (D1), every "fix" it wants is wrong.
# TYPESCRIPT_STANDARD: can't locate worker/tsconfig.json from repo root;
#   revisit with an explicit --project arg if you want this back.
# JAVASCRIPT_STANDARD: single file (functions/weather.js, a Pages Function),
#   not worth a dedicated style pass for one file.
DISABLE_LINTERS:
  - SQL_TSQLLINT
  - TYPESCRIPT_STANDARD
  - JAVASCRIPT_STANDARD

# ACTION_ZIZMOR: run offline (no GitHub API -> no ref-confusion crash) and
#   fail CI only on low+ severity. See .github/zizmor.yml for the ref-pin policy.
ACTION_ZIZMOR_ARGUMENTS:
  - "--offline"
  - "--min-severity=low"

FILTER_REGEX_EXCLUDE: "(package-lock\\.json|streams/.*\\.m3u|favicon\\.ico)"
